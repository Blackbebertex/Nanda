name: ARTHA CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r artha_backend/requirements.txt
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate frontend assets
        working-directory: artha_frontend
        run: npm run validate
      - name: Lint with flake8
        run: |
          flake8 artha_backend --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 artha_backend --count --exit-zero --max-complexity=12 --max-line-length=127 --statistics
      - name: Run unit tests
        env:
          GEMINI_API_KEY: ""
        run: python -m unittest discover -s artha_backend/tests -p "test_*.py"
      - name: Wealth chain eval gate
        env:
          GEMINI_API_KEY: ""
        run: python -m unittest artha_backend.tests.test_wealth_chain.TestWealthChain.test_eval_harness_golden_profiles
      - name: Build Docker image
        run: docker build -f Dockerfile -t artha-api .
