name: ARTHA CI/CD
on:
  push:
    branches: [ main ]
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'
    - name: Run Tests
      run: python -m unittest discover -s artha_backend/tests
    - name: Build Docker Image
      run: docker build -t artha-gateway .
