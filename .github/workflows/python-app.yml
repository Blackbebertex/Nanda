# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install -r artha_backend/requirements.txt
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Validate frontend assets
      working-directory: artha_frontend
      run: npm run validate
    - name: Lint with flake8
      run: |
        flake8 artha_backend --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 artha_backend --count --exit-zero --max-complexity=12 --max-line-length=127 --statistics
    - name: Run unit tests
      run: python -m unittest discover -s artha_backend/tests -p "test_*.py"
