name: ARTHA CI/CD
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install -r artha_backend/requirements.txt
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Validate frontend assets
      working-directory: artha_frontend
      run: npm run validate
    - name: Run Tests
      run: python -m unittest discover -s artha_backend/tests
    - name: Build Docker Image
      run: docker build -f phase_4_5_ops/Dockerfile -t artha-gateway .
