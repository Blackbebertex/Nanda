services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: artha
      POSTGRES_USER: artha
      POSTGRES_PASSWORD: ${DB_PASSWORD:-artha_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  artha_gateway:
    build:
      context: ..
      dockerfile: phase_4_5_ops/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_LEVEL=info
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://artha:${DB_PASSWORD:-artha_dev}@postgres:5432/artha
      - WEALTH_CHAIN_ENABLED=true
    depends_on:
      - postgres
      - redis

  artha_frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../artha_frontend:/usr/share/nginx/html

volumes:
  pgdata:
